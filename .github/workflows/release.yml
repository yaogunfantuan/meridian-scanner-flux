name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag and source
        run: |
          python -m py_compile scanner_http.py option_scanner_core.py exchange_adapters.py option_alert_daemon.py
          bash -n install.sh build_release.sh
          python -m unittest -v test_scanner.py
      - name: Build release assets
        run: ./build_release.sh "${GITHUB_REF_NAME}"
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --verify-tag \
              --generate-notes \
              --title "${GITHUB_REF_NAME}"
          fi
