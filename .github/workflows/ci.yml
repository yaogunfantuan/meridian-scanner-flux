name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Static checks
        run: |
          python -m py_compile scanner_http.py option_scanner_core.py exchange_adapters.py option_alert_daemon.py
          bash -n install.sh build_release.sh
          ./install.sh --help >/dev/null
      - name: Unit tests
        run: python -m unittest -v test_scanner.py
